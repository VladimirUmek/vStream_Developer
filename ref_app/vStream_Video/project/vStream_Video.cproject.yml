project:
  description: vStream Video In/Out example

  packs:
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::CMSIS-RTX

  connections:
    - connect: Board Layer
      consumes:
        - CMSIS_VSTREAM_VIDEO_IN
        - CMSIS_VSTREAM_VIDEO_OUT
        - STDOUT
      provides:
        - CMSIS-RTOS2

  components:
    - component: CMSIS:OS Tick:SysTick
    - component: CMSIS:RTOS2:Keil RTX5&Source

  groups:
    - group: Documentation
      files:
        - file: README.md

    - group: Application
      files:
        - file: app_main.c
        - file: process_frame.c

    - group: Source
      files:
        - file: image_processing_func.c

  layers:
    - layer: $Board-Layer$
      type: Board

  output:
    type:
      - elf
      - bin
      - hex
      - map